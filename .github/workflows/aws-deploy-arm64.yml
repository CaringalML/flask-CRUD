name: Build ARM64 and Push to Docker Hub

on:
  push:
    branches:
      - v5
  pull_request:
    branches:
      - v5

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get install -y libpq-dev
          pip install -r requirements.txt

      - name: Check for errors
        run: |
          python -m py_compile app.py
          python -m py_compile routes.py
          python -m py_compile extensions.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-crud:latest
          platforms: linux/arm64

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-crud-nginx:latest
          platforms: linux/arm64

      - name: Deploy to EC2
        # Only deploy on push to v5, not on pull requests
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app

            # Pull latest images
            docker-compose pull

            # Recreate containers with new images (zero data loss)
            docker-compose up -d

            # Remove old dangling images to save disk space
            docker image prune -f

            echo "Deploy complete"