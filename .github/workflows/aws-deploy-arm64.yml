name: Build ARM64 and Push to Docker Hub

on:
  push:
    branches:
      - v5
  pull_request:
    branches:
      - v5

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs by caching requirements

      - name: Install dependencies
        run: |
          # Update package list first to avoid 404 errors during install
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check for errors
        run: |
          python -m py_compile app.py
          python -m py_compile routes.py
          python -m py_compile extensions.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up QEMU and Buildx (Recommended for reliable multi-platform builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-crud:latest
          platforms: linux/arm64

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-crud-nginx:latest
          platforms: linux/arm64

      - name: Deploy to EC2
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app
            # Pull latest images
            docker-compose pull
            # Recreate containers with new images
            docker-compose up -d
            # Remove old dangling images to save disk space
            docker image prune -f
            echo "Deploy complete"