{% extends "base.html" %}

{% block title %}{% if item %}Edit Item{% else %}Create Item{% endif %} - Flask CRUD{% endblock %}

{% block content %}
<div class="form-container"
     x-data="{ name: '{{ item.name if item else '' }}', desc: `{{ item.description if item else '' }}` }">
    <h2>{% if item %}✏️ Edit Item{% else %}➕ Create New Item{% endif %}</h2>

    <form method="POST"
          hx-post="{{ url_for('main.edit_htmx', item_id=item.id) if item else url_for('main.create_htmx') }}"
          hx-target="#form-result"
          hx-swap="innerHTML"
          hx-indicator="#submit-spinner">

        <div class="form-group">
            <label for="name">Item Name <span class="required">*</span></label>
            <input
                type="text"
                id="name"
                name="name"
                required
                x-model="name"
                placeholder="Enter item name"
                autofocus
            >
            <small class="form-hint">This field is required</small>
        </div>

        <div class="form-group">
            <label for="description">Description <span class="optional">(Optional)</span></label>
            <textarea
                id="description"
                name="description"
                rows="5"
                x-model="desc"
                placeholder="Enter item description..."
            >{{ item.description if item else '' }}</textarea>
            <div class="char-count" x-show="desc.length > 0">
                <span x-text="desc.length"></span> characters
            </div>
        </div>

        <div id="form-result"></div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" :disabled="!name.trim()">
                <span id="submit-spinner" class="spinner htmx-indicator"></span>
                {% if item %}Update Item{% else %}Create Item{% endif %}
            </button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
