<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask CRUD{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- HTMX + Alpine.js + Supabase JS (for Realtime) -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body x-data="{ mobileNav: false }">

    <nav class="navbar">
        <div class="container">
            <a class="logo" href="{{ url_for('main.index') }}">📝 Flask CRUD</a>
            <button class="mobile-toggle" @click="mobileNav = !mobileNav" x-text="mobileNav ? '✕' : '☰'"></button>
            <ul class="nav-links" :class="{ 'nav-open': mobileNav }">
                <li><a href="{{ url_for('main.index') }}" @click="mobileNav = false">Items</a></li>
                <li><a href="{{ url_for('main.create') }}" @click="mobileNav = false">+ New Item</a></li>
            </ul>
        </div>
    </nav>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"
         x-data="{
             toasts: [],
             id: 0,
             add(msg, type) {
                 const t = { id: this.id++, message: msg, type: type || 'success', show: true };
                 this.toasts.push(t);
                 setTimeout(() => this.remove(t.id), 4000);
             },
             remove(id) {
                 const t = this.toasts.find(t => t.id === id);
                 if (t) t.show = false;
                 setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
             }
         }"
         @show-toast.window="add($event.detail.message, $event.detail.type)">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast"
                 :class="'toast-' + toast.type"
                 x-show="toast.show"
                 x-transition:enter="toast-enter"
                 x-transition:enter-start="toast-enter-start"
                 x-transition:enter-end="toast-enter-end"
                 x-transition:leave="toast-leave"
                 x-transition:leave-start="toast-leave-start"
                 x-transition:leave-end="toast-leave-end">
                <span x-text="toast.message"></span>
                <button class="toast-close" @click="remove(toast.id)">&times;</button>
            </div>
        </template>
    </div>

    <div class="container main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}"
                         x-data="{ show: true }"
                         x-show="show"
                         x-transition
                         x-init="setTimeout(() => show = false, 4000)">
                        {{ message }}
                        <button class="alert-close" @click="show = false">&times;</button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Flask CRUD App. Built with HTMX + Alpine.js</p>
    </footer>

    <script>
        // HTMX → Alpine bridge: forward HX-Trigger events to Alpine
        document.body.addEventListener('showToast', function(evt) {
            window.dispatchEvent(new CustomEvent('show-toast', { detail: evt.detail }));
        });

        // HTMX loading states
        document.body.addEventListener('htmx:beforeRequest', e => e.target.classList.add('htmx-loading'));
        document.body.addEventListener('htmx:afterRequest', e => e.target.classList.remove('htmx-loading'));
    </script>
</body>
</html>
